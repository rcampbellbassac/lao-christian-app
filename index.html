<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" href="/favicon.svg" sizes="any" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#2b5797">
    <meta name="apple-mobile-web-app-title" content="LaoChristian.org App">
    <meta name="application-name" content="LaoChristian.org App">
    <meta name="msapplication-TileColor" content="#2b5797">
    <meta name="theme-color" content="#677993">
    <title>LaoChristian.org App</title>
    <script>
      // Restores deep-link paths redirected by public/404.html on GitHub Pages.
      ;(function () {
        const locationRef = window.location
        if (locationRef.search[1] !== '/') return

        const decoded = locationRef.search
          .slice(1)
          .split('&')
          .map((segment) => segment.replace(/~and~/g, '&'))
          .join('?')

        window.history.replaceState(null, '', decoded + locationRef.hash)
      })()
    </script>
  </head>
  <body class="max-w-[2000px] h-full my-auto mx-auto 
  bg-sky-100 dark:bg-neutral-900 text-gray-900 dark:text-gray-100 
  transition-all transition-discrete duration-500 ease-in-out delay-50">
    <div id="app" class=""></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
