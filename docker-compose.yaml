services:
  app:
    container_name: laochristian_app
    build:
      context: ./
      dockerfile: Dockerfile
      target: prod
    ports:
      - "5173:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/lib/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  app-dev:
    container_name: laochristian_app_dev
    profiles: ["dev"]
    build:
      context: ./
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5174:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
